<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LUMEN — Armor of God (3D)</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="theme-color" content="#1d1e3a">
<meta name="description" content="A 3D voxel quest: explore, build, and put on the Armor of God. Gentle, heroic, Catholic.">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0a0b16;font-family:'Press Start 2P',monospace;}
  #c{display:block;width:100vw;height:100vh;}
  .ui{position:fixed;pointer-events:none;color:#f5ecd6;text-shadow:0 2px 4px #000;}
  #title{top:10px;left:12px;font-size:12px;color:#f4d03f;}
  #title small{display:block;font-size:7px;color:#cfe0ff;margin-top:5px;}
  #stats{top:10px;right:12px;text-align:right;font-size:8px;line-height:2;}
  .bar{display:inline-block;width:96px;height:9px;background:rgba(20,21,43,.8);border:1px solid #dcc97a;border-radius:5px;vertical-align:middle;overflow:hidden;}
  .bar>i{display:block;height:100%;}
  #faithFill{background:#bdf0a0;width:100%;}
  #mode{top:42px;left:12px;font-size:8px;}
  #mode b{color:#8fe6ff;}
  #hint{bottom:10px;left:0;right:0;text-align:center;font-size:7px;color:#c9d0ff;line-height:1.9;}
  #msg{left:0;right:0;top:40%;text-align:center;font-size:12px;color:#ffe98a;opacity:0;transition:opacity .35s;}
  #hotbar{bottom:34px;left:0;right:0;text-align:center;font-size:7px;color:#e9e3cf;}
  #hotbar span{display:inline-block;padding:4px 6px;margin:2px;border:1px solid #4a4d8c;border-radius:5px;background:rgba(20,21,43,.7);}
  #hotbar span.on{border-color:#f4d03f;color:#f4d03f;background:rgba(60,50,10,.6);}
  .badge{display:inline-block;background:rgba(20,21,43,.7);border:1px solid #dcc97a;border-radius:6px;padding:4px 7px;}
  #cross{position:fixed;left:50%;top:50%;width:10px;height:10px;margin:-5px 0 0 -5px;pointer-events:none;opacity:.5;}
  #cross::before,#cross::after{content:'';position:absolute;background:#fff;}
  #cross::before{left:4px;top:0;width:2px;height:10px;}
  #cross::after{top:4px;left:0;height:2px;width:10px;}
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="ui" id="title">LUMEN<small>armor of god</small></div>
  <div class="ui" id="stats">
    <div>FAITH <span class="bar"><i id="faithFill"></i></span></div>
    <div id="armorTxt" class="badge">Armor 0/2</div>
    <div id="foeTxt" class="badge">Shadows banished: 0</div>
  </div>
  <div class="ui" id="mode">Mode: <b id="modeTxt">FIGHT</b> &nbsp;(press <b>Tab</b>)</div>
  <div class="ui" id="cross"></div>
  <div class="ui" id="msg"></div>
  <div class="ui" id="hotbar"></div>
  <div class="ui" id="hint"></div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---------- renderer / scene ----------
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight, false);
renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
const SKY = 0xaad7f0;
const scene = new THREE.Scene();
scene.background = new THREE.Color(SKY);
scene.fog = new THREE.Fog(SKY, 30, 64);
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 250);
camera.position.set(10, 10, 16);
const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true; controls.maxPolarAngle = Math.PI * 0.49;
controls.minDistance = 4; controls.maxDistance = 40;
controls.mouseButtons = { LEFT: null, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.ROTATE };
controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };

scene.add(new THREE.HemisphereLight(0xdcefff, 0x4f6a3c, 0.9));
const sun = new THREE.DirectionalLight(0xfff6df, 1.15);
sun.position.set(20, 30, 14); sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
const S = 40; Object.assign(sun.shadow.camera, { left: -S, right: S, top: S, bottom: -S, near: 1, far: 90 });
scene.add(sun);

// ---------- block types (NO ORANGE) ----------
const T = {
  grass: { c: 0x5aa84a }, dirt: { c: 0x6e4a28 }, stone: { c: 0x8a8f98 },
  water: { c: 0x3f7fd6, water: true }, trunk: { c: 0x6e4a28 }, leaf: { c: 0x357a2c },
  brick: { c: 0x9c4444 }, white: { c: 0xe7e0cf }, slate: { c: 0x6c7a9c }, plank: { c: 0x8a5e38 },
  gold: { c: 0xf4d03f, e: 0xb8860b, ei: 0.55 },
  glassB: { c: 0x3f63a8, glass: true }, glassR: { c: 0xc23a4a, glass: true }, glassG: { c: 0x3f8c5a, glass: true },
};
const box = new THREE.BoxGeometry(1, 1, 1);
const matOf = {};
for (const k in T) {
  const t = T[k];
  matOf[k] = new THREE.MeshStandardMaterial({
    color: t.c, roughness: t.glass ? 0.2 : 0.95, metalness: 0,
    emissive: t.e || 0x000000, emissiveIntensity: t.ei || 0,
    transparent: !!(t.glass || t.water), opacity: t.water ? 0.78 : t.glass ? 0.6 : 1,
  });
}

// ---------- voxel store ----------
const world = new Map();       // "x,y,z" -> type
const colTop = new Map();      // "x,z" -> highest SOLID center-y
const K = (x, y, z) => x + ',' + y + ',' + z;
const XZ = (x, z) => x + ',' + z;
function setBlock(x, y, z, type) {
  world.set(K(x, y, z), type);
  if (!T[type].water) { const c = colTop.get(XZ(x, z)); if (c == null || y > c) colTop.set(XZ(x, z), y); }
}
function removeBlock(x, y, z) {
  const had = world.get(K(x, y, z)); if (!had) return;
  world.delete(K(x, y, z));
  if (!T[had].water && colTop.get(XZ(x, z)) === y) {
    let ny = null;
    for (let yy = y - 1; yy >= -1; yy--) { const t = world.get(K(x, yy, z)); if (t && !T[t].water) { ny = yy; break; } }
    if (ny == null) colTop.delete(XZ(x, z)); else colTop.set(XZ(x, z), ny);
  }
}
function surfaceY(x, z) { const c = colTop.get(XZ(Math.round(x), Math.round(z))); return c == null ? 0 : c + 0.5; }

// ---------- meshing (rebuild instanced meshes on edit) ----------
const meshOf = {}, posOf = {};
function remesh() {
  const groups = {};
  for (const [key, type] of world) { (groups[type] || (groups[type] = [])).push(key.split(',').map(Number)); }
  for (const k in meshOf) { scene.remove(meshOf[k]); meshOf[k].dispose(); delete meshOf[k]; delete posOf[k]; }
  const m = new THREE.Matrix4();
  for (const type in groups) {
    const positions = groups[type]; posOf[type] = positions;
    const mesh = new THREE.InstancedMesh(box, matOf[type], positions.length);
    mesh.castShadow = !T[type].water && !T[type].glass; mesh.receiveShadow = true;
    positions.forEach((p, i) => { m.makeTranslation(p[0], p[1], p[2]); mesh.setMatrixAt(i, m); });
    mesh.instanceMatrix.needsUpdate = true; mesh.userData.type = type;
    meshOf[type] = mesh; scene.add(mesh);
  }
}

// ---------- terrain ----------
const R = 16, POND = { x: -9, z: 8, r: 3 };
function heightAt(x, z) {
  const v = 2 + 1.2 * Math.sin(x * 0.45) + 1.1 * Math.cos(z * 0.4) + 0.7 * Math.sin((x + z) * 0.28);
  return Math.max(2, Math.min(5, Math.round(v)));
}
for (let x = -R; x <= R; x++) for (let z = -R; z <= R; z++) {
  if (Math.hypot(x - POND.x, z - POND.z) < POND.r) { setBlock(x, 0, z, 'stone'); setBlock(x, 1, z, 'stone'); setBlock(x, 2, z, 'water'); continue; }
  const h = heightAt(x, z);
  setBlock(x, h, z, 'grass'); setBlock(x, h - 1, z, 'dirt'); setBlock(x, h - 2, z, 'stone');
}
[[6, 9], [11, 3], [-12, -7], [8, -10], [-6, 11], [13, 12]].forEach(([x, z]) => {
  const base = heightAt(x, z) + 1; for (let i = 0; i < 3; i++) setBlock(x, base + i, z, 'trunk');
  const top = base + 3;
  for (let dx = -1; dx <= 1; dx++) for (let dz = -1; dz <= 1; dz++) setBlock(x + dx, top - 1, z + dz, 'leaf');
  for (let dx = -1; dx <= 1; dx++) for (let dz = -1; dz <= 1; dz++) if (Math.abs(dx) + Math.abs(dz) < 2) setBlock(x + dx, top, z + dz, 'leaf');
  setBlock(x, top + 1, z, 'leaf');
});

// ---------- the Shrine of St. Stanislaus (accurate-ish voxel build) ----------
// Gothic Revival: warm RED BRICK + white dressed stone, TWIN SPIRES with gold
// crosses, a great ROSE WINDOW, pointed-arch doors, a cruciform plan, a slate
// gable roof, and a gilded high altar inside.
function fill(x0, x1, y0, y1, z0, z1, type) {
  for (let x = x0; x <= x1; x++) for (let y = y0; y <= y1; y++) for (let z = z0; z <= z1; z++) setBlock(x, y, z, type);
}
function clear(x0, x1, y0, y1, z0, z1) {
  for (let x = x0; x <= x1; x++) for (let y = y0; y <= y1; y++) for (let z = z0; z <= z1; z++) removeBlock(x, y, z);
}
function buildShrine() {
  const FH = 3;                 // floor height (block centre y)
  const fz = -5, bz = -22;      // front (entrance, +z side) and back
  const x0 = -4, x1 = 4;        // nave half-width (9 wide)
  // clear the footprint of any terrain/trees, lay foundation + stone floor
  clear(x0 - 8, x1 + 8, FH, FH + 16, bz - 1, fz + 3);
  fill(x0, x1, FH - 2, FH - 1, bz, fz, 'brick');
  fill(x0, x1, FH, FH, bz, fz, 'white');                         // nave floor
  // nave side walls (brick) with tall glass lancet windows
  for (let z = bz + 1; z <= fz - 1; z++) {
    for (let y = FH + 1; y <= FH + 6; y++) { setBlock(x0, y, z, 'brick'); setBlock(x1, y, z, 'brick'); }
    if ((z - bz) % 3 === 0) for (let y = FH + 3; y <= FH + 5; y++) { setBlock(x0, y, z, 'glassB'); setBlock(x1, y, z, 'glassR'); }
  }
  // back wall (apse) + a high window
  fill(x0, x1, FH + 1, FH + 6, bz, bz, 'brick');
  fill(-1, 1, FH + 3, FH + 5, bz, bz, 'glassG');
  // transept (cross arms) at z ~ -13..-15
  const tz0 = -15, tz1 = -13, tx = 8;
  fill(x0, x1, FH, FH, tz0 - 1, tz1 + 1, 'white');
  for (let x = x0 - tx; x <= x1 + tx; x++) { setBlock(x, FH, tz0 - 1, 'white'); setBlock(x, FH, tz1 + 1, 'white'); }
  fill(x1 + 1, x1 + tx, FH - 2, FH - 1, tz0 - 1, tz1 + 1, 'brick'); fill(x1 + 1, x1 + tx, FH, FH, tz0 - 1, tz1 + 1, 'white');
  fill(x0 - tx, x0 - 1, FH - 2, FH - 1, tz0 - 1, tz1 + 1, 'brick'); fill(x0 - tx, x0 - 1, FH, FH, tz0 - 1, tz1 + 1, 'white');
  for (let x = x0 - tx; x <= x1 + tx; x++) for (let y = FH + 1; y <= FH + 6; y++) { setBlock(x, y, tz0 - 1, 'brick'); setBlock(x, y, tz1 + 1, 'brick'); }
  for (let z = tz0; z <= tz1; z++) for (let y = FH + 1; y <= FH + 6; y++) { setBlock(x0 - tx, y, z, 'brick'); setBlock(x1 + tx, y, z, 'brick'); }
  clear(x0, x1, FH + 1, FH + 6, tz0, tz1);   // open the crossing
  fill(x0 - tx + 1, x1 + tx - 1, FH + 3, FH + 4, tz0, tz0, 'glassB');
  fill(x0 - tx + 1, x1 + tx - 1, FH + 3, FH + 4, tz1, tz1, 'glassR');
  // FRONT FAÇADE between the towers: wall, pointed-arch door, rose window
  for (let x = x0; x <= x1; x++) for (let y = FH + 1; y <= FH + 8; y++) setBlock(x, y, fz, 'brick');
  clear(-1, 1, FH + 1, FH + 3, fz, fz);                          // door opening
  setBlock(0, FH + 4, fz, 'white'); setBlock(-1, FH + 4, fz, 'brick'); setBlock(1, FH + 4, fz, 'brick'); // arch peak
  // rose window (ring of coloured glass)
  const rcx = 0, rcy = FH + 6;
  [[0, 2, 'glassG'], [0, -2, 'glassR'], [2, 0, 'glassB'], [-2, 0, 'glassB'], [1, 1, 'glassR'], [-1, 1, 'glassR'], [1, -1, 'glassB'], [-1, -1, 'glassB']]
    .forEach(([dx, dy, g]) => setBlock(rcx + dx, rcy + dy, fz, g));
  setBlock(rcx, rcy, fz, 'gold');
  for (let x = x0; x <= x1; x++) setBlock(x, FH + 9, fz, 'white');   // cornice
  // TWIN TOWERS with spires + gold crosses (the shrine's signature)
  function tower(cx) {
    fill(cx - 1, cx + 1, FH - 2, FH + 13, fz - 1, fz + 1, 'brick');
    clear(cx, cx, FH + 1, FH + 12, fz, fz);                      // hollow-ish
    for (let y = FH + 4; y <= FH + 11; y += 3) { setBlock(cx, y, fz + 1, 'glassB'); setBlock(cx + 1, y, fz, 'glassB'); setBlock(cx - 1, y, fz, 'glassB'); }
    setBlock(cx, FH + 13, fz, 'white');
    // slate spire (stepped pyramid)
    fill(cx - 1, cx + 1, FH + 14, FH + 14, fz - 1, fz + 1, 'slate');
    setBlock(cx, FH + 15, fz, 'slate'); setBlock(cx, FH + 16, fz, 'slate');
    setBlock(cx, FH + 18, fz, 'gold'); setBlock(cx, FH + 17, fz, 'gold'); // cross shaft
    setBlock(cx - 1, FH + 18, fz, 'gold'); setBlock(cx + 1, FH + 18, fz, 'gold'); // cross arms
  }
  tower(x0 - 1); tower(x1 + 1);
  // slate gable roof over the nave
  const peak = FH + 9;
  for (let z = bz; z <= fz - 1; z++) for (let x = x0; x <= x1; x++) {
    const inset = Math.min(x - x0, x1 - x);
    setBlock(x, FH + 7 + inset, z, 'slate');
  }
  setBlock(0, peak, bz - 0, 'gold');
  // gilded HIGH ALTAR at the apse
  fill(-2, 2, FH + 1, FH + 1, bz + 1, bz + 1, 'white');     // predella
  fill(-2, 2, FH + 2, FH + 5, bz, bz + 1, 'gold');          // gilded reredos
  for (let x = -2; x <= 2; x += 2) clear(x, x, FH + 3, FH + 4, bz + 1, bz + 1); // niches
  setBlock(0, FH + 7, bz + 1, 'gold'); setBlock(0, FH + 6, bz + 1, 'gold');     // altar cross
  setBlock(-1, FH + 7, bz + 1, 'gold'); setBlock(1, FH + 7, bz + 1, 'gold');
  // a path of white stone leading to the doors
  for (let z = fz + 1; z <= fz + 6; z++) fill(-1, 1, heightAt(0, z), heightAt(0, z), z, z, 'white');
}
buildShrine();
remesh();

// ---------- hero ----------
function part(w, h, d, color, x, y, z, opts = {}) {
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.8, emissive: opts.e || 0, emissiveIntensity: opts.ei || 0 });
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat); m.position.set(x, y, z); m.castShadow = true; return m;
}
const hero = new THREE.Group();
hero.add(part(0.3, 0.7, 0.3, 0x33356a, -0.18, 0.35, 0));
hero.add(part(0.3, 0.7, 0.3, 0x33356a, 0.18, 0.35, 0));
hero.add(part(0.74, 0.8, 0.42, 0x4f9a3c, 0, 1.1, 0));
hero.add(part(0.74, 0.18, 0.44, 0xdcc97a, 0, 1.42, 0));
hero.add(part(0.55, 0.5, 0.5, 0xcdbfa0, 0, 1.85, 0));
hero.add(part(0.58, 0.28, 0.54, 0xb9bcc4, 0, 2.05, 0));
hero.add(part(0.1, 0.1, 0.1, 0x1c1c1c, -0.12, 1.82, 0.26));
hero.add(part(0.1, 0.1, 0.1, 0x1c1c1c, 0.12, 1.82, 0.26));
const lArm = new THREE.Group(); lArm.position.set(-0.49, 1.45, 0); lArm.add(part(0.24, 0.7, 0.24, 0x4f9a3c, 0, -0.35, 0)); hero.add(lArm);
const rArm = new THREE.Group(); rArm.position.set(0.49, 1.45, 0); rArm.add(part(0.24, 0.7, 0.24, 0x4f9a3c, 0, -0.35, 0));
const sword = new THREE.Group(); sword.position.set(0, -0.55, 0.15);
sword.add(part(0.1, 0.32, 0.1, 0x6e4a28, 0, 0, 0));
sword.add(part(0.42, 0.1, 0.1, 0xf4d03f, 0, 0.18, 0, { e: 0xb8860b, ei: 0.5 }));
sword.add(part(0.12, 1.15, 0.06, 0xdfffff, 0, 0.85, 0, { e: 0x8fe6ff, ei: 1.5 }));
rArm.add(sword); hero.add(rArm);
let heroX = 0, heroZ = 4;
hero.position.set(heroX, surfaceY(heroX, heroZ), heroZ);
scene.add(hero);

// ---------- armor pickups ----------
const pickups = [];
function makePickup(kind, x, z, build) {
  const g = new THREE.Group(); build(g); g.position.set(x, surfaceY(x, z) + 1.2, z);
  g.userData = { kind, x, z, taken: false }; scene.add(g); pickups.push(g); return g;
}
makePickup('Shield of Faith', 6, 2, (g) => {
  g.add(part(0.74, 0.92, 0.12, 0xc6cfdc, 0, 0, 0, {}));
  g.add(part(0.12, 0.62, 0.06, 0xf4d03f, 0, 0.02, 0.09, { e: 0xb8860b, ei: 0.7 }));
  g.add(part(0.46, 0.12, 0.06, 0xf4d03f, 0, 0.12, 0.09, { e: 0xb8860b, ei: 0.7 }));
});
makePickup('Helmet of Salvation', -7, 3, (g) => {
  g.add(part(0.6, 0.4, 0.6, 0xc6cfdc, 0, 0, 0, {}));
  g.add(part(0.64, 0.14, 0.64, 0xf4d03f, 0, 0.24, 0, { e: 0xb8860b, ei: 0.6 }));
});

// ---------- shadow enemies ----------
const enemies = [];
function spawnEnemy() {
  let x, z, ok = false;
  for (let tries = 0; tries < 24 && !ok; tries++) {
    const ang = Math.random() * Math.PI * 2, rad = 9 + Math.random() * 6;
    x = Math.max(-R + 1, Math.min(R - 1, Math.round(heroX + Math.cos(ang) * rad)));
    z = Math.max(-R + 1, Math.min(R - 1, Math.round(heroZ + Math.sin(ang) * rad)));
    const top = colTop.get(XZ(x, z));
    const tt = top != null ? world.get(K(x, top, z)) : null;
    ok = top != null && top <= 5 && (tt === 'grass' || tt === 'dirt' || tt === 'leaf'); // natural ground only, not the shrine
  }
  if (!ok) return;
  const g = new THREE.Group();
  g.add(part(0.95, 0.95, 0.95, 0x231a40, 0, 0, 0, { e: 0x140d2a, ei: 0.4 }));
  g.add(part(0.18, 0.18, 0.1, 0xc89bf0, -0.2, 0.12, 0.46, { e: 0xb08bd0, ei: 1.6 }));
  g.add(part(0.18, 0.18, 0.1, 0xc89bf0, 0.2, 0.12, 0.46, { e: 0xb08bd0, ei: 1.6 }));
  g.position.set(x, surfaceY(x, z) + 0.9, z); g.userData = { hp: 2, x, z, lastHit: 0 };
  scene.add(g); enemies.push(g);
}
for (let i = 0; i < 4; i++) spawnEnemy();
let spawnTimer = 0;

// ---------- particles ----------
const sparks = [];
function burst(pos, cols = [0x8fe6ff, 0xf4d03f, 0xffffff, 0xbdf0a0]) {
  for (let i = 0; i < 26; i++) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.14, 0.14), new THREE.MeshBasicMaterial({ color: cols[i % cols.length], transparent: true }));
    m.position.copy(pos); m.userData = { v: new THREE.Vector3((Math.random() - 0.5) * 4, Math.random() * 4 + 1, (Math.random() - 0.5) * 4), life: 1.0 };
    scene.add(m); sparks.push(m);
  }
}

// ---------- UI ----------
const msgEl = document.getElementById('msg'); let msgT = 0;
function showMsg(t) { msgEl.textContent = t; msgEl.style.opacity = 1; msgT = 2.4; }
let faith = 100, armor = 0, banished = 0;
const faithFill = document.getElementById('faithFill');
function updHUD() {
  faithFill.style.width = Math.max(0, faith) + '%';
  faithFill.style.background = faith > 40 ? '#bdf0a0' : '#ffd27a';
  document.getElementById('armorTxt').textContent = 'Armor ' + armor + '/2';
  document.getElementById('foeTxt').textContent = 'Shadows banished: ' + banished;
}
const BUILD_TYPES = ['grass', 'stone', 'plank', 'brick', 'white', 'glassB', 'gold'];
let sel = 3;
const hotbar = document.getElementById('hotbar');
function drawHotbar() {
  hotbar.innerHTML = BUILD_TYPES.map((t, i) => `<span class="${i === sel ? 'on' : ''}">${i + 1} ${t}</span>`).join('');
  hotbar.style.display = mode === 'build' ? 'block' : 'none';
}
const hintEl = document.getElementById('hint');
let mode = 'fight';
function setHint() {
  document.getElementById('modeTxt').textContent = mode.toUpperCase();
  hintEl.innerHTML = mode === 'fight'
    ? 'WASD move · Space jump · right-drag look · <b>left-click</b> swing the Sword of the Spirit · Tab → build'
    : 'WASD move · 1-7 pick block · <b>left-click</b> break · <b>shift+click</b> place · Tab → fight';
  drawHotbar();
}

// ---------- input ----------
const keys = {};
addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); if (!jumping) { vy = 6.4; jumping = true; } }
  if (e.code === 'Tab') { e.preventDefault(); mode = mode === 'fight' ? 'build' : 'fight'; setHint(); }
  if (e.code.startsWith('Digit')) { const n = +e.code.slice(5) - 1; if (n >= 0 && n < BUILD_TYPES.length) { sel = n; drawHotbar(); } }
});
addEventListener('keyup', e => { keys[e.code] = false; });
const ray = new THREE.Raycaster();
let downX = 0, downY = 0, downT = 0, downBtn = 0;
canvas.addEventListener('pointerdown', e => { downX = e.clientX; downY = e.clientY; downT = performance.now(); downBtn = e.button; });
canvas.addEventListener('pointerup', e => {
  if (e.button !== 0) return;
  if (Math.hypot(e.clientX - downX, e.clientY - downY) > 6 || performance.now() - downT > 350) return; // a drag, not a click
  const ndc = new THREE.Vector2((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  if (mode === 'fight') swingSword();
  else editBlock(ndc, e.shiftKey);
});
canvas.addEventListener('contextmenu', e => e.preventDefault());

let swing = 0;
function swingSword() {
  swing = 1;
  const f = facing();
  enemies.slice().forEach(en => {
    const dx = en.userData.x - heroX, dz = en.userData.z - heroZ, d = Math.hypot(dx, dz);
    if (d < 2.6 && (dx * f.x + dz * f.z) > -0.3) {
      en.userData.hp -= 1;
      if (en.userData.hp <= 0) { burst(en.position.clone()); scene.remove(en); enemies.splice(enemies.indexOf(en), 1); banished++; updHUD(); }
      else burst(en.position.clone(), [0x8fe6ff, 0xffffff]);
    }
  });
}
function editBlock(ndc, place) {
  ray.setFromCamera(ndc, camera); ray.far = 9;
  const hits = ray.intersectObjects(Object.values(meshOf));
  for (const h of hits) {
    const type = h.object.userData.type; if (T[type].water) continue;
    const bp = posOf[type][h.instanceId];
    if (place) {
      const n = h.face.normal;
      const np = [bp[0] + Math.round(n.x), bp[1] + Math.round(n.y), bp[2] + Math.round(n.z)];
      if (world.has(K(...np))) return;
      if (Math.hypot(np[0] - heroX, np[2] - heroZ) < 0.9 && Math.abs(np[1] - hero.position.y - 1) < 1.5) return; // not inside hero
      setBlock(np[0], np[1], np[2], BUILD_TYPES[sel]);
    } else {
      removeBlock(bp[0], bp[1], bp[2]);
    }
    remesh(); return;
  }
}
function facing() { const f = new THREE.Vector3(); camera.getWorldDirection(f); f.y = 0; f.normalize(); return f; }

// ---------- loop ----------
let vy = 0, jumping = false;
const clock = new THREE.Clock();
function frame() {
  const dt = Math.min(0.05, clock.getDelta()), t = clock.elapsedTime;
  // movement (camera-relative, with wall collision via step height)
  const fwd = facing(), right = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0, 1, 0)).normalize();
  const mv = new THREE.Vector3();
  if (keys['KeyW']) mv.add(fwd); if (keys['KeyS']) mv.sub(fwd);
  if (keys['KeyD']) mv.add(right); if (keys['KeyA']) mv.sub(right);
  if (mv.lengthSq()) {
    mv.normalize().multiplyScalar(5 * dt);
    const feet = hero.position.y, STEP = 1.1;
    const nx = Math.max(-R + .5, Math.min(R - .5, heroX + mv.x));
    if (surfaceY(nx, heroZ) - feet <= STEP) heroX = nx;
    const nz = Math.max(-R + .5, Math.min(R - .5, heroZ + mv.z));
    if (surfaceY(heroX, nz) - feet <= STEP) heroZ = nz;
    hero.rotation.y = Math.atan2(mv.x, mv.z);
  }
  const target = surfaceY(heroX, heroZ);
  if (jumping) { vy -= 18 * dt; let y = hero.position.y + vy * dt; if (y <= target) { y = target; jumping = false; vy = 0; } hero.position.set(heroX, y, heroZ); }
  else hero.position.set(heroX, target, heroZ);
  if (swing > 0) { swing = Math.max(0, swing - dt * 3); rArm.rotation.x = -Math.sin(swing * Math.PI) * 2.3; }
  // pickups
  pickups.forEach(p => {
    if (p.userData.taken) return;
    p.rotation.y += dt * 1.5; p.position.y = surfaceY(p.userData.x, p.userData.z) + 1.2 + Math.sin(t * 2) * 0.12;
    if (Math.hypot(heroX - p.userData.x, heroZ - p.userData.z) < 1.4) {
      p.userData.taken = true; scene.remove(p); armor++; updHUD();
      showMsg(p.userData.kind + ' equipped!'); burst(new THREE.Vector3(heroX, hero.position.y + 1, heroZ));
      if (p.userData.kind.startsWith('Shield')) { hero.add(p); p.position.set(-0.55, 1.1, 0.1); p.scale.setScalar(0.8); p.rotation.set(0, 0, 0); }
      else { hero.add(p); p.position.set(0, 2.2, 0); p.scale.setScalar(0.7); p.rotation.set(0, 0, 0); }
    }
  });
  // enemies chase + attack
  spawnTimer += dt; if (spawnTimer > 5 && enemies.length < 7) { spawnTimer = 0; spawnEnemy(); }
  enemies.forEach(en => {
    const dx = heroX - en.userData.x, dz = heroZ - en.userData.z, d = Math.hypot(dx, dz) || 1;
    if (d > 1.25) {
      const cur = surfaceY(en.userData.x, en.userData.z);
      const nx = en.userData.x + (dx / d) * 1.7 * dt, nz = en.userData.z + (dz / d) * 1.7 * dt;
      if (surfaceY(nx, en.userData.z) - cur <= 1.1) en.userData.x = nx;
      if (surfaceY(en.userData.x, nz) - cur <= 1.1) en.userData.z = nz;
    }
    else if (t - en.userData.lastHit > 1.1) { en.userData.lastHit = t; faith = Math.max(0, faith - 9); updHUD(); burst(en.position.clone(), [0xb08bd0]); }
    en.position.set(en.userData.x, surfaceY(en.userData.x, en.userData.z) + 0.9 + Math.sin(t * 3 + en.userData.x) * 0.12, en.userData.z);
    en.rotation.y = Math.atan2(dx, dz);
  });
  if (faith <= 0) { faith = 100; heroX = 0; heroZ = 4; showMsg('Take heart — rise and stand again!'); enemies.slice(0, 2).forEach(e => { scene.remove(e); }); enemies.splice(0, 2); updHUD(); }
  // sparks
  for (let i = sparks.length - 1; i >= 0; i--) { const s = sparks[i]; s.userData.life -= dt; s.position.addScaledVector(s.userData.v, dt); s.userData.v.y -= 6 * dt; s.material.opacity = Math.max(0, s.userData.life); s.scale.setScalar(Math.max(0.1, s.userData.life)); if (s.userData.life <= 0) { scene.remove(s); sparks.splice(i, 1); } }
  // camera follows hero
  controls.target.lerp(new THREE.Vector3(heroX, hero.position.y + 1.4, heroZ), 0.12);
  controls.update();
  if (msgT > 0) { msgT -= dt; if (msgT <= 0) msgEl.style.opacity = 0; }
  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}
addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight, false); });
updHUD(); setHint();
controls.target.set(heroX, hero.position.y + 1.4, heroZ);
renderer.render(scene, camera);
requestAnimationFrame(frame);
window.__lumen = { scene, camera, hero, renderer, controls, enemies, world, get faith() { return faith; }, get banished() { return banished; }, get mode() { return mode; }, spawnEnemy };
</script>
</body>
