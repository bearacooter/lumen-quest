<script>
  // turn any silent failure into a visible message (so it never just "freezes")
  window.addEventListener('error', function (e) { showErr((e.message || 'error') + '  [' + (e.filename || '').split('/').pop() + ':' + (e.lineno || '') + ']'); });
  window.addEventListener('unhandledrejection', function (e) { showErr('promise: ' + ((e.reason && e.reason.message) || e.reason)); });
  function showErr(msg) {
    var d = document.getElementById('err');
    if (!d) { d = document.createElement('div'); d.id = 'err'; d.style.cssText = 'position:fixed;left:0;right:0;bottom:0;z-index:99;background:rgba(58,13,20,.95);color:#ffe;padding:10px 12px;font:9px/1.6 monospace;'; document.addEventListener('DOMContentLoaded', function () { document.body.appendChild(d); }); if (document.body) document.body.appendChild(d); }
    d.textContent = '⚠ ' + msg + '  — please tell the developer this message.';
  }
</script>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0a0b16;font-family:'Press Start 2P',monospace;}
  #c{display:block;width:100vw;height:100vh;touch-action:none;}
  .ui{position:fixed;pointer-events:none;color:#f5ecd6;text-shadow:0 2px 4px #000;}
  #title{top:10px;left:12px;font-size:12px;color:#f4d03f;}
  #title small{display:block;font-size:7px;color:#cfe0ff;margin-top:5px;}
  #stats{top:10px;right:12px;text-align:right;font-size:8px;line-height:2;}
  .bar{display:inline-block;width:96px;height:9px;background:rgba(20,21,43,.8);border:1px solid #dcc97a;border-radius:5px;vertical-align:middle;overflow:hidden;}
  .bar>i{display:block;height:100%;}
  #faithFill{background:#bdf0a0;width:100%;}
  #heroName{top:44px;left:14px;font-size:8px;color:#bdf0a0;}
  #fps{top:44px;right:14px;font-size:7px;color:#9aa0e0;}
  #mode{top:60px;left:12px;font-size:8px;}
  #mode b{color:#8fe6ff;}
  #map{position:fixed;top:84px;left:12px;width:116px;height:116px;pointer-events:none;z-index:9;display:none;
    border:2px solid #dcc97a;border-radius:8px;background:rgba(12,13,28,.72);box-shadow:0 4px 14px rgba(0,0,0,.45);}
  #hint{bottom:10px;left:0;right:0;text-align:center;font-size:7px;color:#c9d0ff;line-height:1.9;}
  #msg{left:0;right:0;top:40%;text-align:center;font-size:12px;color:#ffe98a;opacity:0;transition:opacity .35s;}
  #hotbar{bottom:34px;left:0;right:0;text-align:center;font-size:7px;color:#e9e3cf;}
  #hotbar span{display:inline-block;padding:4px 6px;margin:2px;border:1px solid #4a4d8c;border-radius:5px;background:rgba(20,21,43,.7);}
  #hotbar span.on{border-color:#f4d03f;color:#f4d03f;background:rgba(60,50,10,.6);}
  .badge{display:inline-block;background:rgba(20,21,43,.7);border:1px solid #dcc97a;border-radius:6px;padding:4px 7px;}
  #saintbox{left:50%;transform:translateX(-50%);bottom:78px;width:min(560px,86vw);text-align:center;
    background:rgba(20,21,43,.86);border:2px solid #dcc97a;border-radius:8px;padding:8px 10px;opacity:0;transition:opacity .3s;}
  #saintbox b{color:#f4d03f;font-size:9px;display:block;margin-bottom:6px;}
  #saintText{color:#eef1f5;font-size:8px;line-height:1.8;}
  #saved{top:70px;right:12px;font-size:8px;color:#bdf0a0;opacity:0;transition:opacity .3s;}
  #slots{position:fixed;top:118px;right:12px;font-size:7px;color:#9aa0e0;z-index:9;}
  #slots button{font-family:inherit;font-size:7px;color:#c9d0ff;background:rgba(20,21,43,.75);border:1px solid #4a4d8c;border-radius:4px;padding:3px 6px;margin-left:3px;cursor:pointer;}
  #slots button.on{border-color:#f4d03f;color:#f4d03f;}
  #newworld{position:fixed;top:140px;right:12px;font-family:inherit;font-size:7px;color:#c9d0ff;background:rgba(20,21,43,.75);border:1px solid #4a4d8c;border-radius:5px;padding:4px 7px;cursor:pointer;z-index:9;}
  /* on-screen touch controls (also clickable with a mouse) */
  .tb{font-family:inherit;color:#dfe3ff;background:rgba(30,32,64,.66);border:1px solid #5a5da0;border-radius:9px;
    font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:none;user-select:none;-webkit-user-select:none;}
  .tb:active{background:rgba(60,64,120,.85);}
  #dpad{position:fixed;left:12px;bottom:16px;display:grid;grid-template-columns:repeat(3,46px);grid-template-rows:repeat(3,46px);gap:5px;z-index:9;}
  #dpad .tb:nth-child(1){grid-column:2;grid-row:1;} #dpad .tb:nth-child(2){grid-column:1;grid-row:2;}
  #dpad .tb:nth-child(3){grid-column:3;grid-row:2;} #dpad .tb:nth-child(4){grid-column:2;grid-row:3;}

  #start{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 90% at 50% 0%, rgba(40,44,90,.5), rgba(10,11,22,.82));}
  .startcard{text-align:center;background:rgba(20,21,43,.92);border:2px solid #dcc97a;border-radius:14px;padding:22px 26px;box-shadow:0 16px 40px rgba(0,0,0,.5);max-width:90vw;}
  .startcard h1{margin:0;font-size:30px;color:#f4d03f;letter-spacing:3px;text-shadow:0 3px 0 #7a5a00,0 0 16px rgba(244,208,63,.4);}
  .startcard .sub{margin:6px 0 18px;font-size:8px;color:#cfe0ff;}
  .startcard label{display:block;font-size:8px;color:#9fd0ff;margin:0 0 7px;}
  #nameInput{font-family:inherit;font-size:11px;text-align:center;color:#fff;background:#11132b;border:2px solid #4a4d8c;border-radius:8px;padding:9px 10px;width:200px;max-width:70vw;outline:none;}
  #nameInput:focus{border-color:#f4d03f;}

  #cross::before{left:4px;top:0;width:2px;height:10px;}
  #cross::after{top:4px;left:0;height:2px;width:10px;}
</style>

<body>
  <canvas id="c"></canvas>
  <div class="ui" id="title">LUMEN<small>armor of god</small></div>

  <div class="ui" id="stats">
    <div>FAITH <span class="bar"><i id="faithFill"></i></span></div>
    <div id="armorTxt" class="badge">Armor 0/2</div>
    <div id="foeTxt" class="badge">Shadows banished: 0</div>

  </div>

  <div id="dpad">
    <button class="tb" data-k="KeyW">&#9650;</button>

  <div id="start">
    <div class="startcard">
      <h1>LUMEN</h1>
      <p class="sub">armor of god &mdash; a 3D quest</p>
      <label for="nameInput">name your hero</label>
      <input id="nameInput" maxlength="14" placeholder="Hero" autocomplete="off" spellcheck="false">
      <button id="startBtn">ENTER THE GARDEN</button>
      <p class="tip">explore &middot; build &middot; stand firm &middot; gather the Armor of God</p>
    </div>
  </div>

<script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
<script>
if (!window.THREE) { var d = document.getElementById('start'); if (d) d.innerHTML = '<div class="startcard"><h1>LUMEN</h1><p class="sub">could not load 3D library</p><p class="tip">Please check your internet connection and reload.</p></div>'; }

// ---------- renderer / scene ----------
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(1);                 // light on weak GPUs (tablets/Chromebooks)
renderer.setSize(innerWidth, innerHeight, false);
renderer.shadowMap.enabled = false;        // real-time shadows over ~10k blocks were too heavy
const SKY = 0xaad7f0;
const scene = new THREE.Scene();
scene.background = new THREE.Color(SKY);
scene.fog = new THREE.Fog(SKY, 38, 86);
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 250);
camera.position.set(10, 10, 16);
// smooth custom third-person camera: trails behind the hero, drag to look
let camYaw = 0, camPitch = 0.6, camDist = 12, lastDragMs = -9999, heroMoving = false;
const camTarget = new THREE.Vector3(0, 5, 4), _cv = new THREE.Vector3();
function applyCamera(dt) {
  // safety: never let camera state go non-finite (would otherwise hang/garble)
  if (!isFinite(camYaw)) camYaw = 0; if (!isFinite(camPitch)) camPitch = 0.6; if (!isFinite(camDist)) camDist = 12;
  const k = Math.min(1, dt * 8);
  _cv.set(heroX, hero.position.y + 1.6, heroZ);
  camTarget.lerp(_cv, k);                                  // smooth target (irons out stair-steps)
  if (heroMoving && performance.now() - lastDragMs > 1100) { // auto-trail behind the hero
    const dy = hero.rotation.y - camYaw, d = Math.atan2(Math.sin(dy), Math.cos(dy)); // loop-free wrap to [-pi,pi]
    camYaw += d * Math.min(1, dt * 1.6);
  }
  const hor = camDist * Math.cos(camPitch), ver = camDist * Math.sin(camPitch);
  let cx = camTarget.x - Math.sin(camYaw) * hor, cy = camTarget.y + ver, cz = camTarget.z - Math.cos(camYaw) * hor;
  // collision awareness: never sit inside a wall/hill — march out from the hero, stop before the first solid voxel
  const ox = cx - camTarget.x, oy = cy - camTarget.y, oz = cz - camTarget.z, len = Math.hypot(ox, oy, oz) || 1, steps = Math.ceil(len / 0.5);
  for (let i = 1; i <= steps; i++) {
    const f = i / steps, tt = world.get(K(Math.round(camTarget.x + ox * f), Math.round(camTarget.y + oy * f), Math.round(camTarget.z + oz * f)));
    if (tt && !T[tt].water) { const g = Math.max(0.18, (i - 1) / steps - 0.06); cx = camTarget.x + ox * g; cy = camTarget.y + oy * g; cz = camTarget.z + oz * g; break; }
  }
  camera.position.set(cx, cy, cz);
  camera.lookAt(camTarget);
}

const hemi = new THREE.HemisphereLight(0xdcefff, 0x4f6a3c, 0.9); scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff6df, 1.15);
sun.position.set(20, 30, 14);
scene.add(sun);

// gentle day <-> night cycle (never pitch-black; safe & pretty)
const SKY_DAY = new THREE.Color(0xaad7f0), SKY_NIGHT = new THREE.Color(0x24365f), DAY_LEN = 150;
let isNight = false;
function updateDayNight(t) {
  const phase = (Math.sin((t / DAY_LEN) * Math.PI * 2 + Math.PI / 2) + 1) / 2; // 1=day, 0=night, starts at day
  isNight = phase < 0.4;
  scene.background.copy(SKY_DAY).lerp(SKY_NIGHT, 1 - phase);
  scene.fog.color.copy(scene.background);
  sun.intensity = 0.75 + phase * 0.6;        // bright floor (no shadows; never gloomy for a kid)
  hemi.intensity = 0.7 + phase * 0.4;
  const a = (t / DAY_LEN) * Math.PI * 2;
  sun.position.set(Math.cos(a) * 24, Math.max(5, Math.sin(a) * 30 + 8), 14);
}

// core run-state (declared early so spawners/quests can read it safely)
let faith = 100, armor = 0, banished = 0, started = false;
const villagers = []; let villagersSafe = 0;

// ---------- gentle audio (WebAudio, no files; starts on first click) ----------
const AC = window.AudioContext || window.webkitAudioContext; let audio = null;
function initAudio() { try { if (!audio && AC) audio = new AC(); if (audio && audio.state === 'suspended') audio.resume(); } catch (e) { } }
function blip(freq, dur, type, vol) {
  if (!audio) return;
  const o = audio.createOscillator(), g = audio.createGain();
  o.type = type || 'square'; o.frequency.value = freq; g.gain.value = vol || 0.05;
  o.connect(g); g.connect(audio.destination); const t = audio.currentTime;
  g.gain.setValueAtTime(g.gain.value, t); g.gain.exponentialRampToValueAtTime(0.0001, t + (dur || 0.12));
  o.start(t); o.stop(t + (dur || 0.12));
}
const sfx = {
  swing() { blip(760, 0.12, 'sawtooth', 0.025); blip(380, 0.1, 'sine', 0.02); },
  hit() { blip(150, 0.1, 'square', 0.06); },
  banish() { [660, 880, 1180].forEach((f, i) => setTimeout(() => blip(f, 0.14, 'triangle', 0.05), i * 55)); },
  pickup() { [700, 1040].forEach((f, i) => setTimeout(() => blip(f, 0.12, 'triangle', 0.06), i * 70)); },
  jump() { blip(520, 0.08, 'square', 0.03); },
  hurt() { blip(190, 0.16, 'sine', 0.05); },
  quest() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => blip(f, 0.18, 'sine', 0.05), i * 110)); },
  boss() { [196, 147].forEach((f, i) => setTimeout(() => blip(f, 0.3, 'sawtooth', 0.05), i * 150)); },
};

// ---------- block types (NO ORANGE) ----------
const T = {
  grass: { c: 0x5aa84a }, dirt: { c: 0x6e4a28 }, stone: { c: 0x8a8f98 },
  water: { c: 0x3f7fd6, water: true }, trunk: { c: 0x6e4a28 }, leaf: { c: 0x357a2c },
  brick: { c: 0x9c4444 }, white: { c: 0xe7e0cf }, slate: { c: 0x6c7a9c }, plank: { c: 0x8a5e38 },
  gold: { c: 0xf4d03f, e: 0xb8860b, ei: 0.55 },
  glassB: { c: 0x3f63a8, glass: true }, glassR: { c: 0xc23a4a, glass: true }, glassG: { c: 0x3f8c5a, glass: true },
  // ---- Shrine showpiece palette ----
  marble: { c: 0xefe7d2 },                 // polished processional pavement
  wood: { c: 0x53381f },                    // pews, choir loft, woodwork
  azure: { c: 0x243a86, e: 0x101a45, ei: 0.18 }, // painted vault — deep starry blue
  glassP: { c: 0x7a4fa0, glass: true }, glassY: { c: 0xd8c24a, glass: true }, // purple + gold stained glass
};
const box = new THREE.BoxGeometry(1, 1, 1);
// tiny procedural texture so blocks read as material, not flat colour
function makeTex(hex) {
  const cv = document.createElement('canvas'); cv.width = cv.height = 16; const cx = cv.getContext('2d');
  const base = new THREE.Color(hex), tmp = new THREE.Color();
  for (let i = 0; i < 16; i++) for (let j = 0; j < 16; j++) {
    tmp.copy(base).offsetHSL((Math.random() - 0.5) * 0.02, (Math.random() - 0.5) * 0.05, (Math.random() - 0.5) * 0.16);
    cx.fillStyle = '#' + tmp.getHexString(); cx.fillRect(i, j, 1, 1);
  }
  const tx = new THREE.CanvasTexture(cv); tx.magFilter = THREE.NearestFilter; tx.minFilter = THREE.NearestFilter; return tx;
}
const matOf = {};
for (const k in T) {
  const t = T[k], plain = t.glass || t.water || t.e; // glass/water/gilded stay pure
  matOf[k] = new THREE.MeshStandardMaterial({
    color: plain ? t.c : 0xffffff, map: plain ? null : makeTex(t.c),
    roughness: t.glass ? 0.2 : 0.95, metalness: 0,
    emissive: t.e || 0x000000, emissiveIntensity: t.ei || 0,
    transparent: !!(t.glass || t.water), opacity: t.water ? 0.78 : t.glass ? 0.6 : 1,
  });
}

// ---------- voxel store ----------
const world = new Map();       // "x,y,z" -> type
const colTop = new Map();      // "x,z" -> highest SOLID center-y
const K = (x, y, z) => x + ',' + y + ',' + z;
const XZ = (x, z) => x + ',' + z;
function setBlock(x, y, z, type) {
  world.set(K(x, y, z), type);
  if (!T[type].water) { const c = colTop.get(XZ(x, z)); if (c == null || y > c) colTop.set(XZ(x, z), y); }
}
function removeBlock(x, y, z) {
  const had = world.get(K(x, y, z)); if (!had) return;
  world.delete(K(x, y, z));
  if (!T[had].water && colTop.get(XZ(x, z)) === y) {
    let ny = null;
    for (let yy = y - 1; yy >= -1; yy--) { const t = world.get(K(x, yy, z)); if (t && !T[t].water) { ny = yy; break; } }
    if (ny == null) colTop.delete(XZ(x, z)); else colTop.set(XZ(x, z), ny);
  }
}
function surfaceY(x, z) { const c = colTop.get(XZ(Math.round(x), Math.round(z))); return c == null ? 0 : c + 0.5; }
// footing that respects interiors: highest standable floor near the hero's height, needing 2 blocks of
// head clearance — so you walk INTO buildings (under roofs) yet walls still block you. null = blocked.
function standY(x, z, fromY) {
  const xi = Math.round(x), zi = Math.round(z), top = colTop.get(XZ(xi, zi));
  if (top == null) return 0;
  const solid = y => { const t = world.get(K(xi, y, zi)); return !!(t && !T[t].water); };
  for (let y = Math.min(top, Math.floor(fromY + 1.1)); y >= -1; y--) {
    if (solid(y)) return (!solid(y + 1) && !solid(y + 2)) ? y + 0.5 : null; // floor w/ headroom, else a wall
  }
  return 0;
}

// ---------- meshing (rebuild instanced meshes on edit) ----------
const meshOf = {}, posOf = {};
function remesh() {
  const groups = {};
  for (const [key, type] of world) { (groups[type] || (groups[type] = [])).push(key.split(',').map(Number)); }
  for (const k in meshOf) { scene.remove(meshOf[k]); meshOf[k].dispose(); delete meshOf[k]; delete posOf[k]; }
  const m = new THREE.Matrix4();
  for (const type in groups) {
    const positions = groups[type]; posOf[type] = positions;
    const mesh = new THREE.InstancedMesh(box, matOf[type], positions.length);
    mesh.castShadow = !T[type].water && !T[type].glass; mesh.receiveShadow = true;
    const jit = !(T[type].glass || T[type].water || T[type].e), col = new THREE.Color();
    positions.forEach((p, i) => {
      m.makeTranslation(p[0], p[1], p[2]); mesh.setMatrixAt(i, m);
      if (jit) { const h = ((p[0] * 73856093) ^ (p[1] * 19349663) ^ (p[2] * 83492791)) >>> 0; const s = 0.86 + (h % 1000) / 1000 * 0.28; mesh.setColorAt(i, col.setRGB(s, s, s)); }
    });
    mesh.instanceMatrix.needsUpdate = true; if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true;
    mesh.userData.type = type; meshOf[type] = mesh; scene.add(mesh);
  }
}

// ---------- terrain ----------
const R = 24, POND = { x: -15, z: 13, r: 5 };
function heightAt(x, z) {
  const v = 2 + 1.3 * Math.sin(x * 0.32) + 1.2 * Math.cos(z * 0.3) + 0.9 * Math.sin((x + z) * 0.2) + 1.1 * Math.cos(x * 0.12 + z * 0.15);
  return Math.max(2, Math.min(6, Math.round(v)));
}
for (let x = -R; x <= R; x++) for (let z = -R; z <= R; z++) {
  if (Math.hypot(x - POND.x, z - POND.z) < POND.r) { setBlock(x, 0, z, 'stone'); setBlock(x, 1, z, 'stone'); setBlock(x, 2, z, 'water'); continue; }
  const h = heightAt(x, z);
  setBlock(x, h, z, 'grass'); setBlock(x, h - 1, z, 'dirt'); setBlock(x, h - 2, z, 'stone');
}
function plantTree(x, z) {
  const base = heightAt(x, z) + 1; for (let i = 0; i < 3; i++) setBlock(x, base + i, z, 'trunk');
  const top = base + 3;
  for (let dx = -1; dx <= 1; dx++) for (let dz = -1; dz <= 1; dz++) setBlock(x + dx, top - 1, z + dz, 'leaf');
  for (let dx = -1; dx <= 1; dx++) for (let dz = -1; dz <= 1; dz++) if (Math.abs(dx) + Math.abs(dz) < 2) setBlock(x + dx, top, z + dz, 'leaf');
  setBlock(x, top + 1, z, 'leaf');
}
for (let i = 0; i < 34; i++) {

    if (en.userData.boss) { bossAlive = false; bossDefeated = true; faith = 100; showMsg('The Great Shadow is vanquished! "The light shines in the darkness." (Jn 1:5)'); sfx.quest(); }
    else { banished++; sfx.banish(); }

  } else { burst(en.position.clone(), [0x8fe6ff, 0xffffff]); sfx.hit(); }
}
function swingSword() {
  swing = 1; sfx.swing();
  const f = facing();

  enemies.slice().forEach(en => {
    const dx = en.userData.x - heroX, dz = en.userData.z - heroZ, d = Math.hypot(dx, dz);

}
// ranged attack — a bolt of holy light
const bolts = [], boltGeo = new THREE.SphereGeometry(0.22, 8, 8), boltMat = new THREE.MeshBasicMaterial({ color: 0x9fe9ff }); // SHARED
let boltCD = 0;
function fireBolt() {

  const f = facing();

function editBlock(ndc, place) {
  ray.setFromCamera(ndc, camera); ray.far = 9;
  const hits = ray.intersectObjects(Object.values(meshOf));
  for (const h of hits) {
    const type = h.object.userData.type; if (T[type].water) continue;
    const bp = posOf[type][h.instanceId];
    if (place) {
      const n = h.face.normal;
      const np = [bp[0] + Math.round(n.x), bp[1] + Math.round(n.y), bp[2] + Math.round(n.z)];
      if (world.has(K(...np))) return;
      if (Math.hypot(np[0] - heroX, np[2] - heroZ) < 0.9 && Math.abs(np[1] - hero.position.y - 1) < 1.5) return; // not inside hero
      setBlock(np[0], np[1], np[2], BUILD_TYPES[sel]); placedCount++;
    } else {

}
function facing() { const f = new THREE.Vector3(); camera.getWorldDirection(f); f.y = 0; f.normalize(); return f; }

// ---------- save / load (localStorage, with 3 slots) ----------
let slot = 1; try { slot = +(localStorage.getItem('lumen_slot')) || 1; } catch (e) { }
function SAVE_KEY() { return 'lumen_save_v1_s' + slot; }
let slotNames = {}; try { slotNames = JSON.parse(localStorage.getItem('lumen_names') || '{}'); } catch (e) { }
function persistNames() { try { localStorage.setItem('lumen_names', JSON.stringify(slotNames)); } catch (e) { } }
function showName() { const el = document.getElementById('heroName'); if (el) el.textContent = '⚔ ' + (slotNames[slot] || ('Hero ' + slot)); }
function ensureName() { if (!slotNames[slot]) { const n = (window.prompt('Name your hero:') || '').trim(); slotNames[slot] = n || ('Hero ' + slot); persistNames(); } showName(); }
function renameHero() { const n = (window.prompt('Name your hero:', slotNames[slot] || '') || '').trim(); if (n) { slotNames[slot] = n; persistNames(); showName(); } }
const TYPE_LIST = Object.keys(T), TYPE_IDX = {}; TYPE_LIST.forEach((k, i) => TYPE_IDX[k] = i);
let dirty = false, saveTimer = 0;
function markDirty() { dirty = true; }
const savedEl = document.getElementById('saved');
let savedTO = 0;
function flashSaved() { savedEl.style.opacity = 1; clearTimeout(savedTO); savedTO = setTimeout(() => savedEl.style.opacity = 0, 1200); }
function doSave() {
  try {
    const w = new Array(world.size * 4); let i = 0;
    for (const [k, type] of world) { const c = k.split(','); w[i++] = +c[0]; w[i++] = +c[1]; w[i++] = +c[2]; w[i++] = TYPE_IDX[type]; }
    localStorage.setItem(SAVE_KEY(), JSON.stringify({
      v: 1, w, hero: [heroX, heroZ], armor: armorSet, armorN: armor, faith, banished, placed: placedCount, bossDone: bossDefeated,
      quests: saints.map(s => ({ a: s.userData.quest.accepted, d: s.userData.quest.done, b: s.userData.quest.baseline })),
    }));
    dirty = false; flashSaved();
  } catch (e) { /* storage unavailable (private mode / quota) */ }
}
function doLoad() {
  let d; try { d = JSON.parse(localStorage.getItem(SAVE_KEY())); } catch (e) { }
  if (!d || !d.w) return false;
  world.clear(); colTop.clear();
  for (let i = 0; i < d.w.length; i += 4) setBlock(d.w[i], d.w[i + 1], d.w[i + 2], TYPE_LIST[d.w[i + 3]]);
  remesh();
  heroX = d.hero[0]; heroZ = d.hero[1]; faith = d.faith; banished = d.banished || 0; placedCount = d.placed || 0;
  Object.assign(armorSet, d.armor || {}); armor = d.armorN || 0; bossDefeated = !!d.bossDone;
  pickups.forEach(p => { if (armorSet[p.userData.id]) { p.userData.taken = true; p.userData.attach(p); } });
  (d.quests || []).forEach((q, i) => { const s = saints[i]; if (!s) return; const qq = s.userData.quest; qq.accepted = q.a; qq.done = q.d; qq.baseline = q.b; if (q.d) s.userData.mark.visible = false; });
  updHUD(); return true;
}
addEventListener('keydown', e => { if (e.code === 'KeyO') doSave(); });
addEventListener('beforeunload', () => { try { doSave(); } catch (e) { } });
document.getElementById('newworld').addEventListener('click', () => { try { localStorage.removeItem(SAVE_KEY()); } catch (e) { } location.reload(); });
function setSlot(n) { try { doSave(); localStorage.setItem('lumen_slot', n); } catch (e) { } location.reload(); }
document.querySelectorAll('#slots [data-slot]').forEach(b => b.addEventListener('click', () => { const n = +b.getAttribute('data-slot'); if (n === slot) renameHero(); else setSlot(n); }));
document.querySelectorAll('#slots [data-slot]').forEach(b => { if (+b.getAttribute('data-slot') === slot) b.classList.add('on'); });

// on-screen touch controls (also work with a mouse)
function bindHold(btn, code) { btn.addEventListener('pointerdown', e => { e.preventDefault(); keys[code] = true; }); const off = () => { keys[code] = false; }; btn.addEventListener('pointerup', off); btn.addEventListener('pointerleave', off); btn.addEventListener('pointercancel', off); }
document.querySelectorAll('#dpad .tb').forEach(b => bindHold(b, b.getAttribute('data-k')));
function tap(id, fn) { document.getElementById(id).addEventListener('pointerup', e => { e.preventDefault(); fn(); }); }
tap('tAct', actPrimary); tap('tBolt', fireBolt); tap('tPlace', actPlace); tap('tJump', doJump); tap('tMode', toggleMode); tap('tTalk', talkSaint);

// ---------- loop ----------
let vy = 0, jumping = false, walkPhase = 0;
const clock = new THREE.Clock();
const fpsEl = document.getElementById('fps'); let fpsT = 0, fpsN = 0, frameCount = 0;
function frame() {
  const dt = Math.min(0.05, clock.getDelta()), t = clock.elapsedTime;
  frameCount++; fpsT += dt; fpsN++; if (fpsT >= 0.5) { fpsEl.textContent = Math.round(fpsN / fpsT) + ' fps · f' + frameCount; fpsT = 0; fpsN = 0; }
  updateDayNight(t);
  if (!started) { applyCamera(dt); renderer.render(scene, camera); requestAnimationFrame(frame); return; }
  // movement (camera-relative, with wall collision via step height)
  const fwd = facing(), right = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0, 1, 0)).normalize();
  const mv = new THREE.Vector3();
  if (keys['KeyW']) mv.add(fwd); if (keys['KeyS']) mv.sub(fwd);
  if (keys['KeyD']) mv.add(right); if (keys['KeyA']) mv.sub(right);
  heroMoving = mv.lengthSq() > 0;
  if (mv.lengthSq()) {
    mv.normalize().multiplyScalar((armorSet.belt ? 6.4 : 5) * dt);
    const feet = hero.position.y, STEP = 1.1;
    const nx = Math.max(-R + .5, Math.min(R - .5, heroX + mv.x));
    const sx = standY(nx, heroZ, feet); if (sx != null && sx - feet <= STEP) heroX = nx;
    const nz = Math.max(-R + .5, Math.min(R - .5, heroZ + mv.z));
    const sz = standY(heroX, nz, feet); if (sz != null && sz - feet <= STEP) heroZ = nz;
    hero.rotation.y = Math.atan2(mv.x, mv.z);
  }
  let target = standY(heroX, heroZ, hero.position.y); if (target == null) target = surfaceY(heroX, heroZ);
  if (jumping) { vy -= 18 * dt; let y = hero.position.y + vy * dt; if (y <= target) { y = target; jumping = false; vy = 0; } hero.position.set(heroX, y, heroZ); }
  else hero.position.set(heroX, target, heroZ);
  // walk cycle — striding legs, swinging arms, knee/elbow flex, idle breathing, a bouncing step
  walkPhase += heroMoving ? dt * 9 : 0;
  const sw = heroMoving ? Math.sin(walkPhase) * 0.62 : Math.sin(t * 1.8) * 0.06;
  lLeg.rotation.x = sw; rLeg.rotation.x = -sw; lArm.rotation.x = -sw * 0.85;
  lLeg.userData.lo.rotation.x = Math.max(0, sw) * 1.2; rLeg.userData.lo.rotation.x = Math.max(0, -sw) * 1.2; // knees bend on the lift
  lArm.userData.lo.rotation.x = 0.22 + Math.max(0, -sw) * 0.35;    // elbow flexes through the swing
  hero.rotation.x = heroMoving ? 0.06 : Math.sin(t * 1.8) * 0.012; // lean into the stride / faint idle breathing
  if (!jumping) hero.position.y += heroMoving ? Math.abs(Math.sin(walkPhase)) * 0.07 : Math.sin(t * 1.8) * 0.015; // step bounce / breathing
  if (swing > 0) {                                                 // diagonal slash — sweeps down and across the body
    swing = Math.max(0, swing - dt * 3); const s = Math.sin(swing * Math.PI);
    rArm.rotation.x = -s * 2.3; rArm.rotation.z = -s * 0.7; rArm.rotation.y = s * 0.35;
  } else { rArm.rotation.x = sw * 0.7; rArm.rotation.z = 0; rArm.rotation.y = 0; }
  // pickups
  pickups.forEach(p => {
    if (p.userData.taken) return;
    p.rotation.y += dt * 1.5; p.position.y = surfaceY(p.userData.x, p.userData.z) + 1.2 + Math.sin(t * 2) * 0.12;
    if (Math.hypot(heroX - p.userData.x, heroZ - p.userData.z) < 1.5) {
      p.userData.taken = true; armorSet[p.userData.id] = true; armor++; updHUD();
      showMsg(p.userData.name + ' — ' + p.userData.power + '!'); burst(new THREE.Vector3(heroX, hero.position.y + 1, heroZ));
      p.userData.attach(p); markDirty(); sfx.pickup();
      if (armor >= ARMOR_TOTAL) setTimeout(() => showMsg('The full Armor of God! "Be strong in the Lord." (Eph 6:10)'), 2300);
    }
  });
  if (armorSet.helmet && faith < 100) { faith = Math.min(100, faith + 4 * dt); updHUD(); }
  // enemies chase + attack
  spawnTimer += dt; if (spawnTimer > 5 && enemies.length < 7) { spawnTimer = 0; spawnEnemy(); }
  if (!bossAlive && !bossDefeated && banished >= 6) spawnBoss();
  enemies.forEach(en => {
    let tx = heroX, tz = heroZ, vill = null;
    if (en.userData.target && villagers.indexOf(en.userData.target) !== -1) { vill = en.userData.target; tx = vill.userData.x; tz = vill.userData.z; }
    else en.userData.target = null;
    const dx = tx - en.userData.x, dz = tz - en.userData.z, d = Math.hypot(dx, dz) || 1;
    if (d > 1.25) {
      const cur = surfaceY(en.userData.x, en.userData.z);
      const sp = en.userData.speed || 1.7;
      const nx = en.userData.x + (dx / d) * sp * dt, nz = en.userData.z + (dz / d) * sp * dt;
      if (surfaceY(nx, en.userData.z) - cur <= 1.1) en.userData.x = nx;
      if (surfaceY(en.userData.x, nz) - cur <= 1.1) en.userData.z = nz;
    } else if (vill) {
      scene.remove(vill); disposeObj(vill); villagers.splice(villagers.indexOf(vill), 1); villagersSafe = Math.max(0, villagersSafe - 1);
      burst(vill.position.clone(), [0x231a40, 0xb08bd0]); showMsg('A villager fled in fear — defend them!'); updHUD();
      en.userData.target = null;
    } else if (t - en.userData.lastHit > 1.1) {
      en.userData.lastHit = t;
      let dmg = en.userData.dmg || 9; if (armorSet.breastplate) dmg *= 0.5;
      if (armorSet.shield && Math.random() < 0.4) { dmg = 0; showMsg('Faith blocks the blow!'); }
      faith = Math.max(0, faith - dmg); updHUD(); burst(en.position.clone(), [0xb08bd0]); if (dmg > 0) sfx.hurt();
    }
    en.position.set(en.userData.x, surfaceY(en.userData.x, en.userData.z) + en.userData.yoff + Math.sin(t * 3 + en.userData.ph) * 0.12, en.userData.z);
    en.rotation.y = Math.atan2(dx, dz);
    if (en.userData.la) { const a = Math.sin(t * 5 + en.userData.ph) * 0.6; en.userData.la.rotation.x = a; en.userData.ra.rotation.x = -a; } // clawing arms
  });
  villagers.forEach(v => {
    const u = v.userData, dx = u.wx - u.x, dz = u.wz - u.z, d = Math.hypot(dx, dz);
    let moving = false;
    if (d > 0.4) {                                   // stroll toward a wander target, stepping over small rises
      const cur = surfaceY(u.x, u.z), sp = 1.3 * dt;
      const nx = u.x + dx / d * sp, nz = u.z + dz / d * sp;
      if (surfaceY(nx, u.z) - cur <= 1.1) u.x = nx;
      if (surfaceY(u.x, nz) - cur <= 1.1) u.z = nz;
      v.rotation.y = Math.atan2(dx, dz); moving = true;
    } else {                                         // arrived: pause, then pick a fresh spot near home
      v.rotation.y = Math.atan2(heroX - u.x, heroZ - u.z); // idle villagers look toward the hero
      u.pause -= dt;
      if (u.pause <= 0) { const a = Math.random() * 6.283, r = 1.5 + Math.random() * 3; u.wx = u.hx + Math.cos(a) * r; u.wz = u.hz + Math.sin(a) * r; u.pause = 1.5 + Math.random() * 2.5; }
    }
    u.walk += moving ? dt * 7 : 0;
    const s = moving ? Math.sin(u.walk) * 0.6 : Math.sin(t * 1.4 + u.t) * 0.04; // stride, or gentle idle breathing

    u.arms[0].rotation.x = -s * 0.8; u.arms[1].rotation.x = s * 0.8; // arms counter-swing
    u.arms[0].userData.lo.rotation.x = u.arms[1].userData.lo.rotation.x = 0.25; // relaxed elbow bend (never ramrod-straight)
    v.rotation.x = moving ? 0.07 : 0;                // slight forward lean while walking
    v.rotation.z = moving ? 0 : Math.sin(t * 1.4 + u.t) * 0.04;

  });
  villagerTimer += dt; if (villagerTimer > 16 && villagersSafe < VILLAGE_MAX) { villagerTimer = 0; spawnVillager(); }
  mapT += dt; if (mapT > 0.12) { mapT = 0; drawMap(); }   // refresh radar ~8x/sec (cheap)
  if (faith <= 0) {
    faith = 100; heroX = 0; heroZ = 4; showMsg('Take heart — rise and stand again!');
    let removed = 0; for (let i = enemies.length - 1; i >= 0 && removed < 2; i--) { if (!enemies[i].userData.boss) { scene.remove(enemies[i]); disposeObj(enemies[i]); enemies.splice(i, 1); removed++; } }
    updHUD();
  }
  // light bolts (ranged attack)
  if (boltCD > 0) boltCD -= dt;
  for (let i = bolts.length - 1; i >= 0; i--) {
    const b = bolts[i]; b.position.x += b.userData.vx * dt; b.position.z += b.userData.vz * dt; b.userData.life -= dt;
    let hitE = null;
    for (const en of enemies) { if (Math.hypot(en.userData.x - b.position.x, en.userData.z - b.position.z) < 0.6 + en.userData.yoff) { hitE = en; break; } }
    if (hitE) { burst(b.position.clone(), [0x8fe6ff, 0xffffff]); scene.remove(b); bolts.splice(i, 1); damageEnemy(hitE, armorSet.sword ? 2 : 1); }
    else if (b.userData.life <= 0) { scene.remove(b); bolts.splice(i, 1); }
  }
  // sparks
  for (let i = sparks.length - 1; i >= 0; i--) { const s = sparks[i]; s.userData.life -= dt; s.position.addScaledVector(s.userData.v, dt); s.userData.v.y -= 6 * dt; s.material.opacity = Math.max(0, s.userData.life); s.scale.setScalar(Math.max(0.1, s.userData.life)); if (s.userData.life <= 0) { scene.remove(s); s.material.dispose(); sparks.splice(i, 1); } }
  applyCamera(dt);   // trails behind the hero, drag-aware (the camera follow lives entirely here)
  saints.forEach(s => { s.userData.mark.rotation.y += dt * 2; s.userData.mark.position.y = 2.45 + Math.sin(t * 2) * 0.1; });
  if (msgT > 0) { msgT -= dt; if (msgT <= 0) msgEl.style.opacity = 0; }
  if (saintT > 0) { saintT -= dt; if (saintT <= 0) saintBox.style.opacity = 0; }
  saveTimer += dt; if (dirty && saveTimer > 2) { saveTimer = 0; doSave(); }
  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}
addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight, false); });
updHUD(); setHint();

{ const ni = document.getElementById('nameInput'); if (ni) ni.value = slotNames[slot] || ''; }
